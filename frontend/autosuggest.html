<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSuggest</title>

    <style>
        .left {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }

        .right {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 18px;
        }

        .search {
            text-align: center;
            margin-top: 100px;
        }

        .colortext {
            color: blue;
        }

        .tag-line {
            color: gray;
        }

        .search-box {
            width: 40%;
            margin: 30px auto 0;
            display: flex;
            align-items: center;
            border: 2px solid #191cdb;
            border-radius: 30px;
            padding: 12px 18px;
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
        }

        .suggestion-box {
            width: 40%;
            margin: 5px auto;
            border: 1px solid #ccc;
            border-top: none;
            text-align: left;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .suggestion-item:hover {
            background: #f2f2f2;
        }
    </style>
</head>
<body>

    <span class="left">&#9881;</span>
    <span class="right">&#8226; online | &#128336; - ms</span>

    <div class="search">
        <h1><span class="colortext">Being</span>Infinity</h1>

        <p class="tag-line">
            One million phrases. Four algorithms. Prefix Based Auto Suggest.
        </p>

        <div class="search-box">
            <span>&#128269;</span>
            <input
                type="text"
                id="searchBox"
                placeholder="Start typing to search phrases">
        </div>

        <div class="suggestion-box" id="suggestions"></div>
    </div>

    <script>
        const searchBox = document.getElementById("searchBox");
        const suggestions = document.getElementById("suggestions");

        searchBox.addEventListener("input", function () {

            const query = searchBox.value.trim();

            if (query === "") {
                suggestions.innerHTML = "";
                return;
            }

            const url = `https://autosuggest-backend.onrender.com/api/autosuggest?q=${encodeURIComponent(query)}&algorithm=brute&limit=10&weighted=false`;

            fetch(url)
                .then(response => response.json())
                .then(data => {

                    suggestions.innerHTML = "";

                    data.results.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "suggestion-item";
                        div.textContent = item.text;

                        div.addEventListener("click", function () {
                            searchBox.value = item.text;
                            suggestions.innerHTML = "";
                        });

                        suggestions.appendChild(div);
                    });
                })
                .catch(error => {
                    console.error(error);
                });
        });
    </script>

</body>
</html>
